<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="/static/css/std.css">
    <link rel="stylesheet" href="/static/css/mplayer.css">
</head>
<body>
    <a href="/" class="link-button">Home</a>
    
    <br>
    <br>
    
    <button class="std-btn" id="toggleInputBlockButton">Add Playlist</button>
    <div class="input-block" id="inputBlock" style="display: none;">
        <div>By Files (.mp3 only): </div>
        <br>
        <form enctype="multipart/form-data" onsubmit="uploadPlaylist(event)">
            <input type="file" id="filesUpload" name="files" multiple accept=".mp3"/>
            <br>
            <input type="text" id="uploadName" placeholder="Enter name of playlist"/>
            <br><br>
            <input class="std-btn" type="submit" value="Upload"/>
        </form>
        <br>
        <div class="spinner" id="spinner"></div>
        <br><br>
        
        <div>By YouTube Playlist: </div>
        <br>
        <input type="text" id="newPlaylistName" placeholder="Enter YouTube playlist link or ID" />
        <br><br>
        <button class="std-btn" id="addPlaylistButton">OK</button>
    </div>

    <br>
    <br>

    <button class="std-btn" id="toggleCompressBlockButton">Compress Playlists</button>
    <div class="compressed-data-block" id="compressBlock" style="display: none;">
        <a class="std-btn compress-data-button" href="/compress_data">Compress Data</a>
        <label for="compressedDataSelect">Compressed Files: </label>
        <select id="compressedDataSelect">
            {% for filename in compressed_data_list %}
                <option>{{ filename }}</option>
            {% endfor %}
        </select>
        <div class="btns-block">
            <button id="downloadCompressedBtn">Download</button>
            <button id="deleteCompressedBtn">Delete</button>
        </div>
        <script>
            document.getElementById('downloadCompressedBtn').onclick = function() {
                const select = document.getElementById('compressedDataSelect');
                const url = `/download_compressed_data?filename=${select.options[select.selectedIndex].text}`;
                if (url) {
                    window.location.href = url;
                }
            };
            document.getElementById('deleteCompressedBtn').onclick = function() {
                const select = document.getElementById('compressedDataSelect');
                const filename = select.options[select.selectedIndex].text;
                fetch(`/delete_compressed_data?filename=${filename}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.text())
                .then(data => {
                    alert(data);
                    location.reload();
                })
                .catch(error => {
                    alert('Error: ' + error);
                });
            };
        </script>
    </div>

    <br>
    <br>

    <button class="std-btn" id="upgradeYtdlpButton">Upgrade yt-dlp</button>

    <br>
    <br>

    <button class="std-btn" id="updateCookiesButton">Update cookies</button>

    </div>

    <h2>Playlist</h2>
    <div id="playlists"></div>

    <script>
        const listsInfo = JSON.parse('{{ lists_info|tojson }}');
        const area = document.getElementById("playlists");
        const spinner = document.getElementById('spinner');

        let xhr = null; 

        const inputBlock = document.getElementById('inputBlock');
        const toggleInputBlockButton = document.getElementById('toggleInputBlockButton');

        const compressBlock = document.getElementById('compressBlock');
        const toggleCompressBlockButton = document.getElementById('toggleCompressBlockButton');

        for (let [index, value] of listsInfo.entries()) {
            const anchor = document.createElement('a');
            anchor.textContent = value["list-name"];
            anchor.href = '/mplayer/' + index;
            anchor.classList.add('playlist-item');
            area.appendChild(anchor);
        }

        function extractPlaylistID(url) {
            // Regular expression to match the playlist ID in the URL
            const playlistRegex = /[?&]list=([a-zA-Z0-9_-]+)/;
            
            // Test the URL and extract the ID if it matches
            const match = url.match(playlistRegex);
            if (match && match[1]) {
                return match[1];
            } else {
                return url;
            }
        }

        function showSpinner() {
            spinner.style.display = "block";
        }
        function hideSpinner() {
            spinner.style.display = "none"; 
        }

        function abortXhr(alert_cancelled = false) {
            if (xhr != null) {
                xhr.abort();
                xhr = null; 
                if (!alert_cancelled) alert("Stop uploading");
                location.reload();
            }
        }
        function uploadPlaylist(event) {
            event.preventDefault();
            if (xhr != null) {
                alert("File is still uploading");
                return ;
            }

            const filesInput = document.getElementById('filesUpload');
            const nameInput = document.getElementById('uploadName');

            showSpinner(); 

            // 確保輸入內容有效
            if (!filesInput.files.length) {
                alert("Please select at least one file.");
                hideSpinner(); 
                return;
            }

            if (!nameInput.value.trim()) {
                alert("Please enter a playlist name.");
                hideSpinner(); 
                return;
            }

            // 構建 FormData 物件
            const formData = new FormData();
            for (const file of filesInput.files) {
                formData.append('files', file); // 多檔案上傳
            }
            formData.append('playlistName', nameInput.value); // 傳遞文字內容

            xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload_playlist', true);

            // var totalSize = null;
            // var totalSizeStr = null;

            // xhr.upload.onprogress = (event) => {
            //     if (event.lengthComputable) {
            //         if (totalSize === null) {
            //             totalSize = event.total;
            //             totalSizeStr = convertSize(totalSize);
            //         }
            //         var percentComplete = (event.loaded / totalSize) * 100;
            //         document.getElementById('progress-bar').value = percentComplete;
            //         document.getElementById('progress-text').textContent = percentComplete.toFixed(2) + "% " + convertSize(event.loaded) + "/" + totalSizeStr;
            //         document.getElementById('progress-div').style.display = 'block';
            //     }
            // };

            xhr.onload = () => {
                if (xhr.status == 200) {
                    hideSpinner(); 
                    alert('File successfully uploaded');
                    alert(xhr.responseText);
                    abortXhr(true);
                    location.reload();
                } else {
                    alert('Error uploading file: ' + xhr.statusText);
                    alert(xhr.responseText);
                    abortXhr(true);
                    hideSpinner(); 
                }
                // totalSize = null;
                // totalSizeStr = null;
            };

            xhr.send(formData);
        }
        
        document.getElementById('addPlaylistButton').addEventListener('click', () => {
            const playlistURL = document.getElementById('newPlaylistName').value.trim();
            if (playlistURL) {
                // Regular expression to match the playlist ID in the URL
                const playlistRegex = /[?&]list=([a-zA-Z0-9_-]+)/;
                var extract_id = extractPlaylistID(playlistURL);
                
                url = `/mplayer_create?yt_playlist_id=${extract_id}`
                window.location.href = url;
            }
        });

        toggleInputBlockButton.addEventListener('click', () => {
            if (inputBlock.style.display === "none" || !inputBlock.style.display) {
                inputBlock.style.display = "block";
                toggleInputBlockButton.textContent = "Hide";
            } else {
                inputBlock.style.display = "none";
                toggleInputBlockButton.textContent = "Add Playlist";
            }
        });
    
        toggleCompressBlockButton.addEventListener('click', () => {
            if (compressBlock.style.display === "none" || !compressBlock.style.display) {
                compressBlock.style.display = "block";
                toggleCompressBlockButton.textContent = "Hide";
            } else {
                compressBlock.style.display = "none";
                toggleCompressBlockButton.textContent = "Compress Playlists";
            }
        });
    
        document.getElementById('upgradeYtdlpButton').addEventListener('click', () => {
            window.location.href = '/upgrade_ytdlp';
        });

        async function customMultiLinePrompt(message) {
            return new Promise((resolve) => {
                // 建立背景遮罩
                const overlay = document.createElement('div');
                overlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,10,20,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:Inter,Segoe UI,system-ui,sans-serif;backdrop-filter:blur(5px);';
                
                // 建立對話框
                const box = document.createElement('div');
                box.style = 'background:linear-gradient(180deg, rgba(12,18,30,0.98), rgba(18,30,50,0.98));padding:24px;border:1px solid rgba(45,160,255,0.22);border-radius:16px;width:420px;display:flex;flex-direction:column;gap:14px;box-shadow:0 0 45px rgba(20,120,255,0.18);color:#e8f3ff;';
                
                // 建立提示文字與多行輸入框
                box.innerHTML = `
                <label style="font-weight:700;font-size:15px;color:#d0e7ff;">${message}</label>
                <textarea id="cookieInput" rows="6" style="width:100%;box-sizing:border-box;padding:12px;background:#121b2f;color:#eaf4ff;border:1px solid rgba(100,180,255,0.18);border-radius:10px;outline:none;font-family:ui-monospace,monospace;font-size:13px;resize:vertical;"></textarea>
                <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px;">
                    <button id="cancelBtn" style="padding:8px 14px;cursor:pointer;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#b8c8e8;">取消</button>
                    <button id="confirmBtn" style="padding:8px 14px;cursor:pointer;background:#0c7cff;color:white;border:none;border-radius:10px;box-shadow:0 0 18px rgba(12,124,255,0.35);">確定</button>
                </div>
                `;
                
                overlay.appendChild(box);
                document.body.appendChild(overlay);
                
                // 綁定按鈕事件
                box.querySelector('#cancelBtn').onclick = () => { overlay.remove(); resolve(null); };
                box.querySelector('#confirmBtn').onclick = () => {
                const val = box.querySelector('#cookieInput').value;
                overlay.remove();
                resolve(val);
                };
            });
        }

        document.getElementById('updateCookiesButton').addEventListener('click', () => {
            customMultiLinePrompt("Raw Cookies (in Netscape format):")
                .then((cookies) => {
                    if (!cookies || cookies === "" || cookies === "null") return ;

                    const url = '/update_cookies'; 
                    fetch(url, {
                        method: "POST", 
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ raw_cookies: cookies })
                    })
                        .then( (response) => {
                            if (response.status === 200) {
                                alert('Update Succesfully');
                                // location.reload();
                            } else {
                                response.text().then((text) => alert(text));
                                // location.reload();
                            }
                        } )
                        .catch( (error) => alert(error) );
                })
                .catch( (error) => alert(error) );
            });
    
    </script>
</body>
</html>
