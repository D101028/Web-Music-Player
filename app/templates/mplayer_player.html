<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <link rel="stylesheet" href="/static/css/mplayer_player.css">
</head>
<body>
    <!-- Back button -->
    <a href="/mplayer/{{ list_id }}" class="back-button">←</a>

    <h1>Audio Player</h1>
    <div style="font-size: medium;">Now Playing: <div id="title">Error</div></div>
    <audio id="audioPlayer" controls autoplay>
        <source id="audioSource" src="" type="audio/mpeg">
        Your browser does not support HTML audio.
    </audio>
    <div>
        <button id="previousButton" class="fancy-button">上一首</button>
        <button id="nextButton" class="fancy-button">下一首</button>
    </div>
    <script id="audio-files-data" type="application/json">
    {{ audio_files|tojson | safe }}
    </script>
    <script id="seq-data" type="application/json">
    {{ seq|tojson | safe }}
    </script>
    <script id="titles-data" type="application/json">
    {{ titles|tojson | safe }}
    </script>
    <script>
        const audioFiles = JSON.parse(document.getElementById('audio-files-data').textContent);
        const sequence = JSON.parse(document.getElementById('seq-data').textContent);
        const titles = JSON.parse(document.getElementById('titles-data').textContent);
        let currentSeqIndex = -1;

        const audioPlayer = document.getElementById('audioPlayer');
        audioPlayer.volume = 0.3;
        const audioSource = document.getElementById('audioSource');
        const nextButton = document.getElementById('nextButton');
        const previousButton = document.getElementById('previousButton');
        const titleDiv = document.getElementById('title');

        // 建立一個變數來儲存超時定時器
        let loadTimeout;

        function createMediaMetadata(title) {
            return new MediaMetadata({
                title: title,
                artist: 'Earphone control enabled',
                album: '{{ list_name }}',
            });
        }

        function playAudio(seqIndex) {
            // 1. 清除上一次的超時設定
            clearTimeout(loadTimeout);

            const fileName = audioFiles[sequence[seqIndex]];
            audioSource.src = `/send_audio_file/${fileName}?list_id={{ list_id }}`;
            
            const curTitle = titles[sequence[seqIndex]];
            titleDiv.textContent = "Loading: " + curTitle; // 顯示載入中狀態

            // 2. 執行負載
            audioPlayer.load();

            // 3. 處理播放 Promise (捕捉播放被阻擋或立即性的錯誤)
            const playPromise = audioPlayer.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.error("Playback failed immediately:", error);
                    // 如果是自動播放被瀏覽器阻擋，通常不跳過；但如果是資源錯誤，則靠 error listener 處理
                });
            }

            // 4. 設定「超時自動跳下一首」
            // 如果 10 秒內沒有成功開始播放，就視為超時並跳過
            loadTimeout = setTimeout(() => {
                if (audioPlayer.paused || audioPlayer.readyState < 3) { 
                    console.warn("Loading timeout, skipping to next...");
                    playNext();
                }
            }, 10000); // 10秒可根據網路狀況調整
        }

        function playNext() {
            currentSeqIndex++;
            if (currentSeqIndex >= sequence.length) {
                currentSeqIndex = 0;
            }
            playAudio(currentSeqIndex);
        }

        function playPrevious() {
            currentSeqIndex--;
            if (currentSeqIndex < 0) {
                currentSeqIndex = sequence.length - 1;
            }
            playAudio(currentSeqIndex);
        }

        // --- 關鍵錯誤處理部分 ---

        // A. 監聽音頻錯誤 (404, 500, 網路中斷等)
        audioPlayer.addEventListener('error', (e) => {
            console.error("Audio error event triggered. Skipping...", e);
            // 延遲 2 秒再跳下一首，避免在完全沒網路時陷入無限快速循環請求
            setTimeout(playNext, 2000); 
        });

        // B. 當音頻成功開始播放時，清除超時計時器
        audioPlayer.addEventListener('playing', () => {
            clearTimeout(loadTimeout);
            const curTitle = titles[sequence[currentSeqIndex]];
            titleDiv.textContent = curTitle; // 更新回正確標題
            
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = createMediaMetadata(curTitle);
            }
        });

        // 正常的結束行為
        audioPlayer.addEventListener('ended', playNext);

        nextButton.addEventListener('click', playNext);
        previousButton.addEventListener('click', playPrevious);

        // 初始播放
        playNext();

        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('nexttrack', playNext);
            navigator.mediaSession.setActionHandler('previoustrack', playPrevious);
        }
    </script>
</body>
