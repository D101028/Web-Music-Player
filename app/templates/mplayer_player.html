<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <link rel="stylesheet" href="/static/css/std.css">
    <link rel="stylesheet" href="/static/css/mplayer_player.css">
</head>
<body>
    <!-- Back button -->
    <a href="/mplayer/{{ list_id }}" class="back-button">←</a>

    <h1>Audio Player</h1>
    <div style="font-size: medium;">Now Playing: <div id="title">Error</div></div>
    <audio id="audioPlayer" controls autoplay>
        <source id="audioSource" src="" type="audio/mpeg">
        Your browser does not support HTML audio.
    </audio>
    <div>
        <button id="previousButton" class="fancy-button">上一首</button>
        <button id="nextButton" class="fancy-button">下一首</button>
    </div>
    <script id="audio-files-data" type="application/json">
    {{ audio_files|tojson | safe }}
    </script>
    <script id="seq-data" type="application/json">
    {{ seq|tojson | safe }}
    </script>
    <script id="titles-data" type="application/json">
    {{ titles|tojson | safe }}
    </script>
    <script>
        const audioFiles = JSON.parse(document.getElementById('audio-files-data').textContent);
        const sequence = JSON.parse(document.getElementById('seq-data').textContent); 
        const titles = JSON.parse(document.getElementById('titles-data').textContent);
        let currentSeqIndex = -1;

        const audioPlayer = document.getElementById('audioPlayer');
        audioPlayer.volume = 0.3; // Set initial volume to 50%
        const audioSource = document.getElementById('audioSource');
        const nextButton = document.getElementById('nextButton');
        const previousButton = document.getElementById('previousButton');
        const titleDiv = document.getElementById('title');

        function createMediaMetadata(title) {
            metadata = new MediaMetadata({
                title: title,
                artist: 'Earphone control enabled',
                album: '{{ list_name }}',
                // artwork: [
                //     { src: 'https://via.placeholder.com/96', sizes: '96x96', type: 'image/png' },
                //     { src: 'https://via.placeholder.com/128', sizes: '128x128', type: 'image/png' },
                //     { src: 'https://via.placeholder.com/192', sizes: '192x192', type: 'image/png' }
                // ]
            });
            return metadata; 
        }

        function playAudio(seqIndex) {
            audioSource.src = `/send_audio_file/${audioFiles[sequence[seqIndex]]}?list_id={{ list_id }}`;
            audioPlayer.load();
            audioPlayer.play();
            
            const curTitle = titles[sequence[seqIndex]]
            titleDiv.textContent = curTitle; 
            navigator.mediaSession.metadata = createMediaMetadata(curTitle); 
        }

        function playNext() {
            currentSeqIndex++;
            if (currentSeqIndex >= audioFiles.length) {
                currentSeqIndex = 0;
            }
            playAudio(currentSeqIndex); 
        }
        function playPrevious() {
            currentSeqIndex--; 
            if (currentSeqIndex < 0) {
                currentSeqIndex = audioFiles.length - 1; 
            }
            playAudio(currentSeqIndex); 
        }


        // 1. 封裝更新媒體資訊的函式（讓每次切歌都能同步到鎖定畫面）
        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                const currentTitle = titles[sequence[currentSeqIndex]];
                navigator.mediaSession.metadata = createMediaMetadata(currentTitle);
                // 每次播新歌，重設狀態
                navigator.mediaSession.playbackState = 'playing';
            }
        }

        // 2. 斷線自動重連機制（防止卡死太久被系統判定閒置）
        let bufferTimeout = null;

        audioPlayer.addEventListener('waiting', () => {
            if ('playbackState' in navigator.mediaSession) {
                navigator.mediaSession.playbackState = 'playing'; // 騙系統還在播
            }

            // 如果卡住（緩衝）超過 8 秒，觸發主動重連，避免被手機系統 Kill 掉
            clearTimeout(bufferTimeout);
            bufferTimeout = setTimeout(() => {
                if (!audioPlayer.paused && audioPlayer.readyState < 3) { 
                    console.log('網路卡死過久，嘗試主動重載流...');
                    const currentTime = audioPlayer.currentTime;
                    audioPlayer.load(); // 重新初始化連接
                    audioPlayer.currentTime = currentTime; // 跳回原時間點
                    audioPlayer.play().catch(err => console.log('等待恢復或需要使用者互動:', err));
                }
            }, 8000); // 8 秒沒動靜就重連
        });

        // 緩衝結束，恢復播放時清除計時器
        audioPlayer.addEventListener('playing', () => {
            clearTimeout(bufferTimeout);
            if ('playbackState' in navigator.mediaSession) {
                navigator.mediaSession.playbackState = 'playing';
            }
        });

        // 監聽播放與暫停，即時同步手機控制中心狀態
        audioPlayer.addEventListener('play', () => {
            if ('playbackState' in navigator.mediaSession) {
                navigator.mediaSession.playbackState = 'playing';
            }
        });
        audioPlayer.addEventListener('pause', () => {
            if ('playbackState' in navigator.mediaSession) {
                navigator.mediaSession.playbackState = 'paused';
            }
        });

        audioPlayer.addEventListener('ended', () => {
            playNext();
            updateMediaSession(); // 切歌時更新資訊
        });

        nextButton.addEventListener('click', () => {
            playNext();
            updateMediaSession();
        });

        previousButton.addEventListener('click', () => {
            playPrevious();
            updateMediaSession();
        });

        // --- Media Session API 完整註冊 ---

        if ('mediaSession' in navigator) {
            // 必須註冊 play 和 pause，鎖定畫面和藍牙耳機的控制才會完全被啟動
            navigator.mediaSession.setActionHandler('play', () => {
                audioPlayer.play().catch(err => console.log(err));
            });
            
            navigator.mediaSession.setActionHandler('pause', () => {
                audioPlayer.pause();
            });

            navigator.mediaSession.setActionHandler('nexttrack', () => {
                playNext();
                updateMediaSession();
            });

            navigator.mediaSession.setActionHandler('previoustrack', () => {
                playPrevious();
                updateMediaSession();
            });
        }

        // 初始播放
        playNext();
        updateMediaSession(); // 初始載入第一首的資訊
    </script>
</body>
